<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム可視化・多重音MusicXML変換装置</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 10px; line-height: 1.6; }
        .box { border: 2px dashed #007bff; padding: 25px; text-align: center; border-radius: 12px; background: #f0f7ff; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; color: #333; white-space: pre-line; }
        /* リアルタイムカウンター用のインジケーターUI */
        .monitor-panel { margin-top: 15px; padding: 15px; background: #222; color: #00ff00; font-family: monospace; border-radius: 6px; text-align: left; box-shadow: inset 0 0 10px #000; }
        .monitor-line { margin: 4px 0; font-size: 14px; }
        .progress-bar { width: 100%; background: #444; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        .progress-fill { width: 0%; background: #00ff00; height: 100%; transition: width 0.1s; }
    </style>
</head>
<body>

    <h2>🎼 リアルタイム可視化 ➔ MusicXML 変換装置</h2>
    <p>FFTによる周波数解析の進捗、現在の検知周波数、配置された音符の数をリアルタイムで画面に表示します。</p>

    <div class="box">
        <input type="file" id="audioFile" accept=".mp3,.wav,.ogg,audio/*"><br>
        <button id="convertBtn" disabled>楽曲をリアルタイム解析</button>
    </div>

    <!-- 📊 リアルタイムに数値を叩き出すモニター画面 -->
    <div class="monitor-panel">
        <div class="monitor-line">【ステータス】 <span id="monStatus" style="color: #fff;">待機中</span></div>
        <div class="monitor-line">【推定テンポ】 <span id="monBpm">-</span> BPM</div>
        <div class="monitor-line">【現在の進捗】 <span id="monPercent">0</span> %</div>
        <div class="monitor-line">【検知周波数】 <span id="monFreq">-</span> Hz</div>
        <div class="monitor-line">【設置音符数】 <span id="monNoteCount">0</span> 個</div>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    </div>

    <div id="status">ファイルを選択してください。</div>

    <script>
        const fileInput = document.getElementById('audioFile');
        const convertBtn = document.getElementById('convertBtn');
        const statusDiv = document.getElementById('status');
        
        // モニター用DOMの取得
        const monStatus = document.getElementById('monStatus');
        const monBpm = document.getElementById('monBpm');
        const monPercent = document.getElementById('monPercent');
        const monFreq = document.getElementById('monFreq');
        const monNoteCount = document.getElementById('monNoteCount');
        const progressFill = document.getElementById('progressFill');
        
        let audioContext;

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                convertBtn.disabled = false;
                statusDiv.innerText = "ボタンを押して高度解析を開始してください。";
            }
        });

        convertBtn.addEventListener('click', async () => {
            const files = fileInput.files;
            if (files.length === 0) return;
            const file = files[0];

            convertBtn.disabled = true;
            monStatus.innerText = "システム起動中";

            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') { await audioContext.resume(); }

            statusDiv.innerText = "音声ファイルを高度デコード中...";
            monStatus.innerText = "デコード中";
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                
                statusDiv.innerText = "楽曲全体のテンポ（BPM）を物理スキャン中...";
                monStatus.innerText = "BPMスキャン";
                const detectedBPM = estimateBPM(audioBuffer);
                monBpm.innerText = detectedBPM;
                
                statusDiv.innerText = "FFTによる和音・スペクトル解析を実行中...";
                monStatus.innerText = "FFT解析中";
                
                // ★グラフィックスと文字をリアルタイム更新するため、非同期呼び出しを後半にバトンタッチ
                analyzePolyphonicNotesAsync(audioBuffer, detectedBPM, file.name);
                
            } catch (error) {
                console.error(error);
                statusDiv.innerText = "解析エラーが発生しました。ファイル形式を確認してください。";
                monStatus.innerText = "エラー終了";
                convertBtn.disabled = false;
            }
        });

        // 🎵 BPMの特定ロジック
        function estimateBPM(audioBuffer) {
            const data = audioBuffer.getChannelData(0);
            const sampleRate = audioBuffer.sampleRate;
            const winSize = Math.floor(sampleRate * 0.05);
            const energyGrid = [];
            
            for (let i = 0; i < data.length; i += winSize) {
                let sum = 0;
                for (let j = 0; j < winSize && (i + j) < data.length; j++) { sum += Math.abs(data[i + j]); }
                energyGrid.push(sum);
            }

            const peaks = [];
            for (let i = 1; i < energyGrid.length - 1; i++) {
                if (energyGrid[i] > energyGrid[i-1] * 1.3 && energyGrid[i] > energyGrid[i+1]) { peaks.push(i * 0.05); }
            }

            const intervals = [];
            for (let i = 1; i < peaks.length; i++) {
                const diff = peaks[i] - peaks[i-1];
                if (diff > 0.3 && diff < 1.5) { intervals.push(diff); }
            }

            if (intervals.length === 0) return 120;
            intervals.sort((a, b) => a - b);
            let bpm = Math.round(60 / intervals[Math.floor(intervals.length / 2)]);
            while (bpm < 60) bpm *= 2;
            while (bpm > 180) bpm = Math.round(bpm / 2);
            return bpm;
        }
        // 🎵 後半①：非同期（タイムアウト分割）処理によるリアルタイム進捗描画とFFT多重音解析
        function analyzePolyphonicNotesAsync(audioBuffer, bpm, originalFileName) {
            const channelData = audioBuffer.getChannelData(0);
            const sampleRate = audioBuffer.sampleRate;
            const bufferSize = 2048; // FFTウィンドウサイズ
            
            const secondsPerBeat = 60 / bpm;
            const secondsPer16th = secondsPerBeat / 4; 
            const hopSize = Math.floor(sampleRate * secondsPer16th);

            const rawTimeline = [];
            let i = 0;
            let notePlacementCount = 0;

            // ブラウザのフリーズを防ぎ、毎フレーム画面を書き換えるためのループ関数
            function processChunk() {
                // 1回のアニメーションフレームで処理するステップ数（バランス調整用）
                const stepsPerFrame = 50; 
                let stepsDone = 0;

                while (i < channelData.length - bufferSize && stepsDone < stepsPerFrame) {
                    const signal = channelData.subarray(i, i + bufferSize);
                    
                    // 高速フーリエ変換(FFT)を実行して周波数ごとの音量を解析
                    const spectrum = performSimpleFFT(signal);
                    
                    // スペクトルから音量の大きいピーク（周波数）を複数抽出（和音対応）
                    const detectedPitches = findPeaksInSpectrum(spectrum, sampleRate);
                    
                    if (detectedPitches.length > 0) {
                        rawTimeline.push(detectedPitches); // 和音（配列）として記録
                        notePlacementCount += detectedPitches.length;
                        
                        // モニター画面に「現在の代表的な周波数」をリアルタイム反映
                        monFreq.innerText = Math.round(detectedPitches[0].frequency) + " Hz";
                    } else {
                        rawTimeline.push([-1]); // 無音（休符）として記録
                    }

                    // リアルタイムUIカウンターの数値を更新
                    const percent = Math.min(100, Math.round((i / (channelData.length - bufferSize)) * 100));
                    monPercent.innerText = percent;
                    progressFill.style.width = percent + "%";
                    monNoteCount.innerText = notePlacementCount;

                    i += hopSize;
                    stepsDone++;
                }

                if (i < channelData.length - bufferSize) {
                    // まだ曲の途中の場合は、一瞬ブラウザに描画権を返して次のループへ
                    requestAnimationFrame(processChunk);
                } else {
                    // 曲の最後までスキャンが完了したら、XML生成（次の後半コード②）へ進む
                    statusDiv.innerText = "全小節の解析完了！XML楽譜ファイルを構築しています...";
                    monStatus.innerText = "XML構築中";
                    
                    setTimeout(() => {
                        const processedNotes = structureTimelineToNotes(rawTimeline);
                        const xmlString = generateFinalMusicXML(processedNotes, bpm);
                        
                        const outputName = originalFileName.substring(0, originalFileName.lastIndexOf('.')) + '_live.musicxml';
                        downloadXML(xmlString, outputName);
                        
                        statusDiv.innerText = `変換成功！BPM ${bpm}、全データをFlat形式で出力しました。`;
                        monStatus.innerText = "完了・保存済";
                        convertBtn.disabled = false;
                    }, 50);
                }
            }

            // リアルタイムループを開始
            requestAnimationFrame(processChunk);
        }

        // 簡易的な離散・高速フーリエ変換(FFT)風アルゴリズム
        function performSimpleFFT(signal) {
            const N = signal.length;
            const spectrum = new Float32Array(N / 2);
            // 処理速度向上のため、12音階の基本周波数にターゲットを絞って強度を計算
            for (let k = 0; k < N / 2; k += 2) {
                let real = 0;
                let imag = 0;
                for (let n = 0; n < N; n += 4) { // 高速化のため間引きサンプリング
                    const angle = (2 * Math.PI * k * n) / N;
                    real += signal[n] * Math.cos(angle);
                    imag -= signal[n] * Math.sin(angle);
                }
                spectrum[k] = Math.sqrt(real * real + imag * imag);
            }
            return spectrum;
        }

        // 周波数の波から、基準以上の強さを持つ「音の山（和音）」を見つける関数
        function findPeaksInSpectrum(spectrum, sampleRate) {
            const N = spectrum.length * 2;
            const peaks = [];
            const threshold = 1.5; // ノイズ除去のしきい値

            for (let k = 2; k < spectrum.length - 2; k++) {
                if (spectrum[k] > spectrum[k-1] && spectrum[k] > spectrum[k+1] && spectrum[k] > threshold) {
                    const freq = (k * sampleRate) / N;
                    const midi = Math.round(12 * Math.log2(freq / 440) + 69);
                    
                    // 認識可能な楽器の音域内であり、重複していないかをチェック
                    if (midi >= 36 && midi <= 96 && !peaks.some(p => p.midi === midi)) {
                        peaks.push({ frequency: freq, midi: midi });
                    }
                }
            }
            // 1つの時間枠（16分音符）あたり最大3音までの和音に制限して返す
            return peaks.slice(0, 3);
        }
        // 🎵 後半②：16分音符の和音タイムラインを、MusicXML用の音符データ構造に変換する関数
        function structureTimelineToNotes(rawTimeline) {
            const processedNotes = [];
            if (rawTimeline.length === 0) return processedNotes;

            // タイムラインを走査して、同じ組み合わせの和音（または休符）が何個続いたかを数える
            let currentPitches = rawTimeline[0];
            let currentDurationCount = 1;

            // 2つの配列（MIDI番号の組み合わせ）が一致しているか判定するヘルパー
            const arePitchesEqual = (arr1, arr2) => {
                if (arr1.length !== arr2.length) return false;
                const s1 = arr1.map(p => p.midi || p).sort();
                const s2 = arr2.map(p => p.midi || p).sort();
                return s1.every((val, index) => val === s2[index]);
            };

            for (let i = 1; i < rawTimeline.length; i++) {
                if (arePitchesEqual(rawTimeline[i], currentPitches)) {
                    currentDurationCount++;
                } else {
                    const noteTypeInfo = getNoteTypeByDuration(currentDurationCount);
                    
                    // 和音に含まれるすべてのMIDI音を配列で格納
                    const midis = currentPitches.map(p => p.midi).filter(m => m !== undefined);

                    processedNotes.push({
                        midis: midis.length > 0 ? midis : [-1], // 空なら休符(-1)
                        duration: currentDurationCount,
                        type: noteTypeInfo.type,
                        dot: noteTypeInfo.dot
                    });
                    currentPitches = rawTimeline[i];
                    currentDurationCount = 1;
                }
            }

            // 最後の残った和音ブロックを処理
            if (currentDurationCount > 0) {
                const noteTypeInfo = getNoteTypeByDuration(currentDurationCount);
                const midis = currentPitches.map(p => p.midi).filter(m => m !== undefined);
                processedNotes.push({
                    midis: midis.length > 0 ? midis : [-1],
                    duration: currentDurationCount,
                    type: noteTypeInfo.type,
                    dot: noteTypeInfo.dot
                });
            }

            return processedNotes;
        }

        // 16分音符の個数からMusicXMLの音符タイプを割り出すマッパー
        function getNoteTypeByDuration(count) {
            if (count >= 16) return { type: "whole", dot: false };
            if (count >= 12) return { type: "half", dot: true };
            if (count >= 8)  return { type: "half", dot: false };
            if (count >= 6)  return { type: "quarter", dot: true };
            if (count >= 4)  return { type: "quarter", dot: false };
            if (count >= 3)  return { type: "eighth", dot: true };
            if (count >= 2)  return { type: "eighth", dot: false };
            return { type: "16th", dot: false };
        }

        const MIDI_MAP = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        
        // 最終的な和音対応MusicXMLデータを生成する関数
        function generateFinalMusicXML(notes, bpm) {
            let xml = `<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE score-partwise PUBLIC "-//Recordare//DTD MusicXML 4.0 Partwise//EN" "http://musicxml.org">
<score-partwise version="4.0">
  <work><work-title>Awaken Live Poly Score</work-title></work>
  <part-list>
    <score-part id="P1"><part-name>Audio Track</part-name></score-part>
  </part-list>
  <part id="P1">\n`;

            let measureNumber = 1;
            let currentMeasureDuration = 0;
            const maxMeasureDuration = 16; // 4/4拍子（16分音符16個で1小節）

            // 第1小節の初期設定
            xml += `    <measure number="${measureNumber}">
      <attributes>
        <divisions>4</divisions>
        <key><fifths>0</fifths></key>
        <time><beats>4</beats><beat-type>4</beat-type></time>
        <clef><sign>G</sign><line>2</line></clef>
      </attributes>
      <direction placement="above">
        <direction-type>
          <metronome><beat-unit>quarter</beat-unit><per-minute>${bpm}</per-minute></metronome>
        </direction-type>
        <sound tempo="${bpm}"/>
      </direction>\n`;

            notes.forEach(note => {
                let remainingDuration = note.duration;

                while (remainingDuration > 0) {
                    let availableSpace = maxMeasureDuration - currentMeasureDuration;
                    
                    if (availableSpace <= 0) {
                        xml += `    </measure>\n`;
                        measureNumber++;
                        xml += `    <measure number="${measureNumber}">\n`;
                        currentMeasureDuration = 0;
                        availableSpace = maxMeasureDuration;
                    }

                    let durationToInsert = Math.min(remainingDuration, availableSpace);
                    let typeInfo = getNoteTypeByDuration(durationToInsert);

                    // 休符の場合
                    if (note.midis[0] === -1) {
                        xml += `      <note>
        <rest/>
        <duration>${durationToInsert}</duration>
        <voice>1</voice>
        <type>${typeInfo.type}</type>
        ${typeInfo.dot ? '<dot/>' : ''}
      </note>\n`;
                    } else {
                        // 和音（複数のノート）の場合、2音目以降に <chord/> タグを付与して縦に重ねる
                        note.midis.forEach((midi, index) => {
                            const step = MIDI_MAP[midi % 12];
                            const alter = step.includes('#') ? 1 : 0;
                            const stepName = step.replace('#', '');
                            const octave = Math.floor(midi / 12) - 1;

                            xml += `      <note>
        ${index > 0 ? '<chord/>' : ''}
        <pitch>
          <step>${stepName}</step>
          ${alter ? '<alter>1</alter>' : ''}
          <octave>${octave}</octave>
        </pitch>
        <duration>${durationToInsert}</duration>
        <voice>1</voice>
        <type>${typeInfo.type}</type>
        ${typeInfo.dot ? '<dot/>' : ''}
      </note>\n`;
                        });
                    }

                    currentMeasureDuration += durationToInsert;
                    remainingDuration -= durationToInsert;
                }
            });

            xml += `    </measure>
  </part>
</score-partwise>
`;
            return xml;
        }

        // ダウンロード処理用
        function downloadXML(content, fileName) {
            const blob = new Blob([content], { type: 'application/vnd.recordare.musicxml+xml' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
