<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超最速・ミリ秒感知MusicXML変換装置</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 10px; line-height: 1.6; }
        .box { border: 2px dashed #007bff; padding: 25px; text-align: center; border-radius: 12px; background: #f0f7ff; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        /* カウンター画面 */
        .monitor-panel { margin-top: 15px; padding: 15px; background: #111; color: #00ff00; font-family: monospace; border-radius: 6px; text-align: left; }
        .monitor-line { margin: 4px 0; font-size: 14px; }
        .progress-bar { width: 100%; background: #333; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        .progress-fill { width: 0%; background: #00ff00; height: 100%; }
    </style>
</head>
<body>

    <h2>🎼 超細かい音も逃さない ➔ MusicXML変換装置</h2>
    <p>ミリ秒単位の細かいHz（周波数）の変化を限界まで感知し、リアルタイムで音符を設置していきます。</p>

    <div class="box">
        <input type="file" id="audioFile" accept=".mp3,.wav,.ogg,audio/*"><br>
        <button id="convertBtn" disabled>最速リアルタイム解析をスタート</button>
    </div>

    <!-- 📊 リアルタイムカウンター -->
    <div class="monitor-panel">
        <div class="monitor-line">【解析状態】 <span id="monStatus" style="color: #fff;">待機中</span></div>
        <div class="monitor-line">【テンポ設定】 <span id="monBpm">-</span> BPM</div>
        <div class="monitor-line">【スキャン進捗】 <span id="monPercent">0</span> %</div>
        <div class="monitor-line">【超細かい検知Hz】 <span id="monFreq">-</span> Hz</div>
        <div class="monitor-line">【設置された音符数】 <span id="monNoteCount">0</span> 個</div>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    </div>

    <div id="status">ファイルを選択してください。</div>

    <script>
        const fileInput = document.getElementById('audioFile');
        const convertBtn = document.getElementById('convertBtn');
        const statusDiv = document.getElementById('status');
        
        const monStatus = document.getElementById('monStatus');
        const monBpm = document.getElementById('monBpm');
        const monPercent = document.getElementById('monPercent');
        const monFreq = document.getElementById('monFreq');
        const monNoteCount = document.getElementById('monNoteCount');
        const progressFill = document.getElementById('progressFill');
        
        let audioContext;

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                convertBtn.disabled = false;
                statusDiv.innerText = "ボタンを押して最速解析を開始してください。";
            }
        });

        convertBtn.addEventListener('click', async () => {
            const files = fileInput.files;
            if (files.length === 0) return;
            const file = files[0];

            convertBtn.disabled = true;
            monStatus.innerText = "オーディオ起動";

            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') { await audioContext.resume(); }

            statusDiv.innerText = "音声データを読み込み中...";
            monStatus.innerText = "デコード中";
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                
                statusDiv.innerText = "BPMを自動計算中...";
                const detectedBPM = estimateBPM(audioBuffer);
                monBpm.innerText = detectedBPM;
                
                statusDiv.innerText = "ミリ秒単位のピッチ感知ループを実行中...";
                monStatus.innerText = "最速スキャン中";
                
                // ★後半コードの非同期最速ループへデータを引き渡す
                startFastScanLoop(audioBuffer, detectedBPM, file.name);
                
            } catch (error) {
                console.error(error);
                statusDiv.innerText = "エラーが発生しました。ファイルを確認してください。";
                monStatus.innerText = "停止";
                convertBtn.disabled = false;
            }
        });

        // テンポ判定
        function estimateBPM(audioBuffer) {
            const data = audioBuffer.getChannelData(0);
            const sampleRate = audioBuffer.sampleRate;
            const winSize = Math.floor(sampleRate * 0.05);
            const energyGrid = [];
            for (let i = 0; i < data.length; i += winSize) {
                let sum = 0;
                for (let j = 0; j < winSize && (i + j) < data.length; j++) { sum += Math.abs(data[i + j]); }
                energyGrid.push(sum);
            }
            const peaks = [];
            for (let i = 1; i < energyGrid.length - 1; i++) {
                if (energyGrid[i] > energyGrid[i-1] * 1.3 && energyGrid[i] > energyGrid[i+1]) { peaks.push(i * 0.05); }
            }
            const intervals = [];
            for (let i = 1; i < peaks.length; i++) {
                const diff = peaks[i] - peaks[i-1];
                if (diff > 0.3 && diff < 1.5) { intervals.push(diff); }
            }
            if (intervals.length === 0) return 120;
            intervals.sort((a, b) => a - b);
            let bpm = Math.round(60 / intervals[Math.floor(intervals.length / 2)]);
            while (bpm < 60) bpm *= 2;
            while (bpm > 180) bpm = Math.round(bpm / 2);
            return bpm;
        }
        // 🎵 後半の前半：超微細なHz変化を逃さずスキャンし、即座に音符を設置するループ
        function startFastScanLoop(audioBuffer, bpm, originalFileName) {
            const channelData = audioBuffer.getChannelData(0);
            const sampleRate = audioBuffer.sampleRate;
            const bufferSize = 1024; // 解析の窓を小さくして、より細かく感知
            
            const secondsPerBeat = 60 / bpm;
            // 32分音符や超高速フレーズまで逃さないために、解析の分解能を限界まで引き上げる
            const secondsPerStep = secondsPerBeat / 8; 
            const hopSize = Math.floor(sampleRate * secondsPerStep);

            const rawTimeline = [];
            let i = 0;
            let notePlacementCount = 0;

            // 画面を一切フリーズさせずに、超高速でカウントアップを描画するループ関数
            function processChunk() {
                // 1回のアニメーションフレームで一気に処理するステップ数を多くして高速化
                const stepsPerFrame = 200; 
                let stepsDone = 0;

                while (i < channelData.length - bufferSize && stepsDone < stepsPerFrame) {
                    const signal = channelData.subarray(i, i + bufferSize);
                    
                    // 超微細な周波数（Hz）の変化を感知
                    const frequency = autoCorrelateMicro(signal, sampleRate);
                    
                    if (frequency > 0) {
                        // 小さなHzのブレもそのままMIDIノート番号へ忠実に変換
                        const midiNote = Math.round(12 * Math.log2(frequency / 440) + 69);
                        
                        if (midiNote >= 36 && midiNote <= 96) {
                            rawTimeline.push(midiNote);
                            notePlacementCount++;
                            // 画面上のHzメーターを超細かく、リアルタイムに変動させる
                            monFreq.innerText = frequency.toFixed(1) + " Hz";
                        } else {
                            rawTimeline.push(-1);
                        }
                    } else {
                        rawTimeline.push(-1); // 休符区間
                    }

                    // リアルタイムUIカウンターの数値をダダダダッと更新
                    const percent = Math.min(100, Math.round((i / (channelData.length - bufferSize)) * 100));
                    monPercent.innerText = percent;
                    progressFill.style.width = percent + "%";
                    monNoteCount.innerText = notePlacementCount;

                    i += hopSize;
                    stepsDone++;
                }

                if (i < channelData.length - bufferSize) {
                    // まだ曲が残っている場合は、一瞬だけブラウザに描画権を返して即座に次フレームを実行
                    requestAnimationFrame(processChunk);
                } else {
                    statusDiv.innerText = "すべての微細ピッチスキャンが完了！正常なMusicXMLを構築中...";
                    monStatus.innerText = "XML書き出し";
                    
                    setTimeout(() => {
                        const processedNotes = combineTimelineToNotes(rawTimeline);
                        const xmlString = generateFinalCleanXML(processedNotes, bpm);
                        
                        const outputName = originalFileName.substring(0, originalFileName.lastIndexOf('.')) + '_micro.musicxml';
                        downloadXML(xmlString, outputName);
                        
                        statusDiv.innerText = `大成功！BPM ${bpm} / 完全に計算された綺麗な楽譜を保存しました。`;
                        monStatus.innerText = "完了・ダウンロード済";
                        convertBtn.disabled = false;
                    }, 50);
                }
            }

            // スキャンループを起動
            requestAnimationFrame(processChunk);
        }

        // 超微細なピッチ変化（Hz）をこぼさず拾うための改良型自己相関アルゴリズム
        function autoCorrelateMicro(buffer, sampleRate) {
            let SIZE = buffer.length;
            let rms = 0;
            for (let i = 0; i < SIZE; i++) { rms += buffer[i] * buffer[i]; }
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.008) return -1; // しきい値を下げて、かすかな小さい音でも拾うように強化

            let r1 = 0, r2 = SIZE - 1;
            let thres = 0.15;
            for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(buffer[i]) < thres) { r1 = i; break; } }
            for (let i = SIZE - 1; i >= SIZE / 2; i--) { if (Math.abs(buffer[i]) < thres) { r2 = i; break; } }

            buffer = buffer.slice(r1, r2);
            SIZE = buffer.length;

            let c = new Float32Array(SIZE);
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE - i; j++) { c[i] = c[i] + buffer[j] * buffer[j + i]; }
            }

            let d = 0;
            while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE / 2; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }

            let T0 = maxpos;
            if (T0 > 0) return sampleRate / T0;
            return -1;
        }
        // 🎵 後半の後半：タイムラインのデータを、MusicXML規格の綺麗な音符配列に仕分ける
        function combineTimelineToNotes(rawTimeline) {
            const processedNotes = [];
            if (rawTimeline.length === 0) return processedNotes;

            let currentMidi = rawTimeline[0];
            let currentDurationCount = 1;

            for (let i = 1; i < rawTimeline.length; i++) {
                if (rawTimeline[i] === currentMidi) {
                    currentDurationCount++;
                } else {
                    const noteTypeInfo = getNoteXmlType(currentDurationCount);
                    processedNotes.push({
                        midi: currentMidi,
                        duration: currentDurationCount, // divisions=8
                        type: noteTypeInfo.type,
                        dot: noteTypeInfo.dot
                    });
                    currentMidi = rawTimeline[i];
                    currentDurationCount = 1;
                }
            }
            
            if (currentDurationCount > 0) {
                const noteTypeInfo = getNoteXmlType(currentDurationCount);
                processedNotes.push({
                    midi: currentMidi,
                    duration: currentDurationCount,
                    type: noteTypeInfo.type,
                    dot: noteTypeInfo.dot
                });
            }

            return processedNotes;
        }

        // divisions=8（32分音符基準）に最適化された音符マッパー
        function getNoteXmlType(count) {
            if (count >= 32) return { type: "whole", dot: false };   // 全音符
            if (count >= 24) return { type: "half", dot: true };     // 付点2分音符
            if (count >= 16) return { type: "half", dot: false };    // 2分音符
            if (count >= 12) return { type: "quarter", dot: true };  // 付点4分音符
            if (count >= 8)  return { type: "quarter", dot: false }; // 4分音符
            if (count >= 6)  return { type: "eighth", dot: true };   // 付点8分音符
            if (count >= 4)  return { type: "eighth", dot: false };  // 8分音符
            if (count >= 3)  return { type: "16th", dot: true };    // 付点16分音符
            if (count >= 2)  return { type: "16th", dot: false };   // 16分音符
            return { type: "32nd", dot: false };                     // 32分音符
        }

        const MIDI_MAP = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        
        // エラーを絶対に出さず、Flatへのインポートを美しく通すMusicXML構築ロジック
        function generateFinalCleanXML(notes, bpm) {
            let xml = `<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE score-partwise PUBLIC "-//Recordare//DTD MusicXML 4.0 Partwise//EN" "http://musicxml.org">
<score-partwise version="4.0">
  <work><work-title>Awaken Micro Live Score</work-title></work>
  <part-list>
    <score-part id="P1"><part-name>Audio Track</part-name></score-part>
  </part-list>
  <part id="P1">\n`;

            let measureNumber = 1;
            let currentMeasureDuration = 0;
            const maxMeasureDuration = 32; // 4/4拍子において、32分音符32個分で1小節

            // 第1小節
            xml += `    <measure number="${measureNumber}">
      <attributes>
        <divisions>8</divisions> <!-- 32分音符まで表現できるように数値を拡張 -->
        <key><fifths>0</fifths></key>
        <time><beats>4</beats><beat-type>4</beat-type></time>
        <clef><sign>G</sign><line>2</line></clef>
      </attributes>
      <direction placement="above">
        <direction-type>
          <metronome><beat-unit>quarter</beat-unit><per-minute>${bpm}</per-minute></metronome>
        </direction-type>
        <sound tempo="${bpm}"/>
      </direction>\n`;

            notes.forEach(note => {
                let remainingDuration = note.duration;

                while (remainingDuration > 0) {
                    let availableSpace = maxMeasureDuration - currentMeasureDuration;
                    
                    if (availableSpace <= 0) {
                        xml += `    </measure>\n`;
                        measureNumber++;
                        xml += `    <measure number="${measureNumber}">\n`;
                        currentMeasureDuration = 0;
                        availableSpace = maxMeasureDuration;
                    }

                    let durationToInsert = Math.min(remainingDuration, availableSpace);
                    let typeInfo = getNoteXmlType(durationToInsert);

                    if (note.midi === -1) {
                        xml += `      <note>
        <rest/>
        <duration>${durationToInsert}</duration>
        <voice>1</voice>
        <type>${typeInfo.type}</type>
        ${typeInfo.dot ? '<dot/>' : ''}
      </note>\n`;
                    } else {
                        const step = MIDI_MAP[note.midi % 12];
                        const alter = step.includes('#') ? 1 : 0;
                        const stepName = step.replace('#', '');
                        const octave = Math.floor(note.midi / 12) - 1;

                        xml += `      <note>
        <pitch>
          <step>${stepName}</step>
          ${alter ? '<alter>1</alter>' : ''}
          <octave>${octave}</octave>
        </pitch>
        <duration>${durationToInsert}</duration>
        <voice>1</voice>
        <type>${typeInfo.type}</type>
        ${typeInfo.dot ? '<dot/>' : ''}
      </note>\n`;
                    }

                    currentMeasureDuration += durationToInsert;
                    remainingDuration -= durationToInsert;
                }
            });

            xml += `    </measure>
  </part>
</score-partwise>\n`;
            return xml;
        }

        // ダウンロード
        function downloadXML(content, fileName) {
            const blob = new Blob([content], { type: 'application/vnd.recordare.musicxml+xml' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
