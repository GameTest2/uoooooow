<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声からMusicXML変換装置（完全版）</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 10px; line-height: 1.6; }
        .box { border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 8px; background: #f9f9f9; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h2>🎼 音声ファイル ➔ MusicXML 変換装置</h2>
    <p>Ogg、MP3、WAVファイルを選択して、BPMと正確な音の長さを解析し、Flat対応の楽譜データを生成します。</p>

    <div class="box">
        <input type="file" id="audioFile" accept=".mp3,.wav,.ogg,audio/*"><br>
        <button id="convertBtn" disabled>楽譜(MusicXML)に変換</button>
    </div>

    <div id="status">ファイルを選択してください。</div>

    <script>
        const fileInput = document.getElementById('audioFile');
        const convertBtn = document.getElementById('convertBtn');
        const statusDiv = document.getElementById('status');
        
        let audioContext;

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                convertBtn.disabled = false;
                statusDiv.innerText = "ボタンを押して変換を開始してください。";
            } else {
                convertBtn.disabled = true;
                statusDiv.innerText = "ファイルを選択してください。";
            }
        });

        convertBtn.addEventListener('click', async () => {
            const files = fileInput.files;
            if (files.length === 0) return;
            const file = files[0];

            convertBtn.disabled = true;
            statusDiv.innerText = "オーディオシステムを再開中...";

            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            statusDiv.innerText = "音声ファイルをデコード中...";
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                
                statusDiv.innerText = "楽曲のテンポ（BPM）を解析中...";
                const detectedBPM = estimateBPM(audioBuffer);
                
                statusDiv.innerText = "音符とリズム（音の長さ）を精密解析中...";
                // ★この後、後半コードの「analyzePreciseNotes」を呼び出します
                const notes = analyzePreciseNotes(audioBuffer, detectedBPM);
                
                if (notes.length === 0) {
                    statusDiv.innerText = "エラー: 音符が検出されませんでした。";
                    convertBtn.disabled = false;
                    return;
                }

                statusDiv.innerText = "MusicXMLファイルを生成中...";
                const xmlString = generateMusicXML(notes, detectedBPM);
                
                const outputName = file.name.substring(0, file.name.lastIndexOf('.')) + '.musicxml';
                downloadXML(xmlString, outputName);
                statusDiv.innerText = `変換完了！BPM ${detectedBPM} で楽譜をダウンロードしました。`;
            } catch (error) {
                console.error(error);
                statusDiv.innerText = "エラーが発生しました。デコードに失敗した可能性があります。";
            }
            convertBtn.disabled = false;
        });

        // 🎵 BPM（テンポ）の自動判定ロジック
        function estimateBPM(audioBuffer) {
            const data = audioBuffer.getChannelData(0);
            const sampleRate = audioBuffer.sampleRate;
            const winSize = Math.floor(sampleRate * 0.05);
            const energyGrid = [];
            
            for (let i = 0; i < data.length; i += winSize) {
                let sum = 0;
                for (let j = 0; j < winSize && (i + j) < data.length; j++) {
                    sum += Math.abs(data[i + j]);
                }
                energyGrid.push(sum);
            }

            const peaks = [];
            for (let i = 1; i < energyGrid.length - 1; i++) {
                if (energyGrid[i] > energyGrid[i-1] * 1.3 && energyGrid[i] > energyGrid[i+1]) {
                    peaks.push(i * 0.05);
                }
            }

            const intervals = [];
            for (let i = 1; i < peaks.length; i++) {
                const diff = peaks[i] - peaks[i-1];
                if (diff > 0.3 && diff < 1.5) {
                    intervals.push(diff);
                }
            }

            if (intervals.length === 0) return 120;

            intervals.sort((a, b) => a - b);
            const medianInterval = intervals[Math.floor(intervals.length / 2)];
            let bpm = Math.round(60 / medianInterval);

            while (bpm < 60) bpm *= 2;
            while (bpm > 180) bpm = Math.round(bpm / 2);

            return bpm;
        }
        // 🎵 【後半】音高と「音の長さ（リズム）」を精密に検出するロジック
        function analyzePreciseNotes(audioBuffer, bpm) {
            const channelData = audioBuffer.getChannelData(0);
            const sampleRate = audioBuffer.sampleRate;
            const bufferSize = 2048;
            
            // 1拍あたりの秒数、および16分音符1つあたりの秒数をBPMから計算
            const secondsPerBeat = 60 / bpm;
            const secondsPer16th = secondsPerBeat / 4; 

            // 解析の間隔（ホップサイズ）を16分音符の長さに同期させる
            const hopSize = Math.floor(sampleRate * secondsPer16th);

            const rawTimeline = [];

            // 1. 各時間軸（16分音符ごと）のピッチを網羅的にスキャン
            for (let i = 0; i < channelData.length - bufferSize; i += hopSize) {
                const signal = channelData.subarray(i, i + bufferSize);
                const frequency = autoCorrelate(signal, sampleRate);
                
                if (frequency > 0) {
                    const midiNote = Math.round(12 * Math.log2(frequency / 440) + 69);
                    if (midiNote >= 36 && midiNote <= 96) {
                        rawTimeline.push(midiNote);
                        continue;
                    }
                }
                rawTimeline.push(-1); // 音が検出されなかった（休符候補）
            }

            const processedNotes = [];
            let currentMidi = rawTimeline[0];
            let currentDurationCount = 1;

            // 2. 同じ音が何個（16分音符いくつ分）連続したかをカウントして長さを割り出す
            for (let i = 1; i < rawTimeline.length; i++) {
                if (rawTimeline[i] === currentMidi) {
                    currentDurationCount++;
                } else {
                    if (currentMidi !== -1) {
                        // 16分音符の個数（durationCount）から楽譜上の音符タイプに変換
                        const noteTypeInfo = getNoteTypeByDuration(currentDurationCount);
                        processedNotes.push({
                            midi: currentMidi,
                            duration: currentDurationCount, // divisions=4 のため、1 = 16分音符、4 = 4分音符
                            type: noteTypeInfo.type,
                            dot: noteTypeInfo.dot
                        });
                    }
                    currentMidi = rawTimeline[i];
                    currentDurationCount = 1;
                }
            }
            
            // 最後の残り音を処理
            if (currentMidi !== -1 && currentDurationCount > 0) {
                const noteTypeInfo = getNoteTypeByDuration(currentDurationCount);
                processedNotes.push({
                    midi: currentMidi,
                    duration: currentDurationCount,
                    type: noteTypeInfo.type,
                    dot: noteTypeInfo.dot
                });
            }

            return processedNotes.slice(0, 300); // Flatの処理負荷を考慮し最大300音に制限
        }

        // 内部ピッチ検出（自己相関法）
        function autoCorrelate(buffer, sampleRate) {
            let SIZE = buffer.length;
            let rms = 0;
            for (let i = 0; i < SIZE; i++) { rms += buffer[i] * buffer[i]; }
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.015) return -1;

            let r1 = 0, r2 = SIZE - 1;
            let thres = 0.2;
            for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(buffer[i]) < thres) { r1 = i; break; } }
            for (let i = SIZE - 1; i >= SIZE / 2; i--) { if (Math.abs(buffer[i]) < thres) { r2 = i; break; } }

            buffer = buffer.slice(r1, r2);
            SIZE = buffer.length;

            let c = new Float32Array(SIZE);
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE - i; j++) { c[i] = c[i] + buffer[j] * buffer[j + i]; }
            }

            let d = 0;
            while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE / 2; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }

            let T0 = maxpos;
            if (T0 > 0) return sampleRate / T0;
            return -1;
        }

        // 16分音符のカウント数から、MusicXML規格の音符タイプを返す関数
        function getNoteTypeByDuration(count) {
            if (count >= 16) return { type: "whole", dot: false };       // 全音符 (16歩)
            if (count >= 12) return { type: "half", dot: true };         // 付点2分音符 (12歩)
            if (count >= 8)  return { type: "half", dot: false };        // 2分音符 (8歩)
            if (count >= 6)  return { type: "quarter", dot: true };      // 付点4分音符 (6歩)
            if (count >= 4)  return { type: "quarter", dot: false };     // 4分音符 (4歩)
            if (count >= 3)  return { type: "eighth", dot: true };       // 付点8分音符 (3歩)
            if (count >= 2)  return { type: "eighth", dot: false };      // 8分音符 (2歩)
            return { type: "16th", dot: false };                         // 16分音符 (1歩)
        }

        const MIDI_MAP = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        
        // 精密化されたMusicXMLデータの生成
        function generateMusicXML(notes, bpm) {
            let xml = `<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE score-partwise PUBLIC "-//Recordare//DTD MusicXML 4.0 Partwise//EN" "http://musicxml.org">
<score-partwise version="4.0">
  <work><work-title>Awaken Precise Score</work-title></work>
  <part-list>
    <score-part id="P1"><part-name>Audio Track</part-name></score-part>
  </part-list>
  <part id="P1">\n`;

            let measureNumber = 1;
            let currentMeasureDuration = 0;
            const maxMeasureDuration = 16; // 4/4拍子において、16分音符16個分で1小節

            // 第1小節のヘッダーを出力
            xml += `    <measure number="${measureNumber}">
      <attributes>
        <divisions>4</divisions> <!-- 1拍を4分割して16分音符に対応 -->
        <key><fifths>0</fifths></key>
        <time><beats>4</beats><beat-type>4</beat-type></time>
        <clef><sign>G</sign><line>2</line></clef>
      </attributes>
      <direction placement="above">
        <direction-type>
          <metronome><beat-unit>quarter</beat-unit><per-minute>${bpm}</per-minute></metronome>
        </direction-type>
        <sound tempo="${bpm}"/>
      </direction>\n`;

            notes.forEach(note => {
                // 今回の音符を入れると1小節（16カウント）を超える場合、小節をまたぐ処理を行う
                if (currentMeasureDuration + note.duration > maxMeasureDuration) {
                    xml += `    </measure>\n`;
                    measureNumber++;
                    xml += `    <measure number="${measureNumber}">\n`;
                    currentMeasureDuration = 0;
                }

                const step = MIDI_MAP[note.midi % 12];
                const alter = step.includes('#') ? 1 : 0;
                const stepName = step.replace('#', '');
                const octave = Math.floor(note.midi / 12) - 1;

                xml += `      <note>
        <pitch>
          <step>${stepName}</step>
          ${alter ? '<alter>1</alter>' : ''}
          <octave>${octave}</octave>
        </pitch>
        <duration>${note.duration}</duration>
        <voice>1</voice>
        <type>${note.type}</type>
        ${note.dot ? '<dot/>' : ''}
      </note>\n`;
                
                currentMeasureDuration += note.duration;
            });

            // 残りの小節末尾を閉じて、XML・スクリプト・HTML全体のタグを終了させる
            xml += `    </measure>
  </part>
</score-partwise>`;
            return xml;
        }

        // ダウンロード処理
        function downloadXML(content, fileName) {
            const blob = new Blob([content], { type: 'application/vnd.recordare.musicxml+xml' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
