<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声からMusicXML変換装置</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 10px; line-height: 1.6; }
        .box { border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 8px; background: #f9f9f9; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h2>🎼 音声ファイル ➔ MusicXML 変換装置</h2>
    <p>Ogg、MP3、WAVファイルを選択して、音高（ピッチ）を解析し、簡易的なMusicXML楽譜データを生成します。</p>

    <div class="box">
        <input type="file" id="audioFile" accept=".mp3,.wav,.ogg,audio/*"><br>
        <button id="convertBtn" disabled>楽譜(MusicXML)に変換</button>
    </div>

    <div id="status">ファイルを選択してください。</div>

    <script>
        const fileInput = document.getElementById('audioFile');
        const convertBtn = document.getElementById('convertBtn');
        const statusDiv = document.getElementById('status');
        
        let audioContext;

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                convertBtn.disabled = false;
                statusDiv.innerText = "ボタンを押して変換を開始してください。";
            } else {
                convertBtn.disabled = true;
                statusDiv.innerText = "ファイルを選択してください。";
            }
        });

        convertBtn.addEventListener('click', async () => {
            const files = fileInput.files;
            if (files.length === 0) return;
            const file = files[0];

            convertBtn.disabled = true;
            statusDiv.innerText = "オーディオシステムを再開中...";

            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            statusDiv.innerText = "音声ファイルをデコード中...";
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                
                statusDiv.innerText = "音高を高速解析中（耳コピ中）...";
                // 遅延の原因だった外部ライブラリを使わず、内製アルゴリズムで解析
                const notes = analyzePitchNative(audioBuffer);
                
                if (notes.length === 0) {
                    statusDiv.innerText = "エラー: 音符が検出されませんでした。音が小さいか、和音が多い可能性があります。";
                    convertBtn.disabled = false;
                    return;
                }

                statusDiv.innerText = "MusicXMLファイルを生成中...";
                const xmlString = generateMusicXML(notes);
                
                const outputName = file.name.substring(0, file.name.lastIndexOf('.')) + '.musicxml';
                downloadXML(xmlString, outputName);
                statusDiv.innerText = "変換完了！楽譜ファイルがダウンロードされました。";
            } catch (error) {
                console.error(error);
                statusDiv.innerText = "エラーが発生しました。ファイルのデコードに失敗した可能性があります。";
            }
            convertBtn.disabled = false;
        });

        // 外部ライブラリを使わない、軽量な自己相関法（Autocorrelation）によるピッチ検出
        function analyzePitchNative(audioBuffer) {
            const channelData = audioBuffer.getChannelData(0);
            const sampleRate = audioBuffer.sampleRate;
            const bufferSize = 2048;
            const notes = [];
            let previousMidi = -1;

            // 100msごとにサンプリングして解析
            const hopSize = Math.floor(sampleRate * 0.1); 

            for (let i = 0; i < channelData.length - bufferSize; i += hopSize) {
                const signal = channelData.subarray(i, i + bufferSize);
                
                // 自作のピッチ検出アルゴリズムを実行
                const frequency = autoCorrelate(signal, sampleRate);
                
                if (frequency > 0) {
                    const midiNote = Math.round(12 * Math.log2(frequency / 440) + 69);
                    // 人間の歌声や一般的な楽器の範囲（C2〜C7程度）に限定
                    if (midiNote >= 36 && midiNote <= 96) {
                        if (midiNote !== previousMidi) {
                            notes.push(midiNote);
                            previousMidi = midiNote;
                        }
                    }
                }
            }
            return notes.slice(0, 200); // 最大200音まで
        }

        // 自己相関関数（音の周期性から周波数を割り出す）
        function autoCorrelate(buffer, sampleRate) {
            let SIZE = buffer.length;
            let rms = 0;

            for (let i = 0; i < SIZE; i++) {
                let val = buffer[i];
                rms += val * val;
            }
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.01) return -1; // 音が小さすぎる場合は無視

            let r1 = 0, r2 = SIZE - 1;
            let thres = 0.2;
            for (let i = 0; i < SIZE / 2; i++) {
                if (Math.abs(buffer[i]) < thres) { r1 = i; break; }
            }
            for (let i = SIZE - 1; i >= SIZE / 2; i--) {
                if (Math.abs(buffer[i]) < thres) { r2 = i; break; }
            }

            buffer = buffer.slice(r1, r2);
            SIZE = buffer.length;

            let c = new Float32Array(SIZE);
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE - i; j++) {
                    c[i] = c[i] + buffer[j] * buffer[j + i];
                }
            }

            let d = 0;
            while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE / 2; i++) {
                if (c[i] > maxval) {
                    maxval = c[i];
                    maxpos = i;
                }
            }

            let T0 = maxpos;
            if (T0 > 0) {
                return sampleRate / T0;
            }
            return -1;
        }

        const MIDI_MAP = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        
        function generateMusicXML(notes) {
            let xml = `<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE score-partwise PUBLIC "-//Recordare//DTD MusicXML 4.0 Partwise//EN" "http://musicxml.org">
<score-partwise version="4.0">
  <part-list>
    <score-part id="P1"><part-name>Awaken Track</part-name></score-part>
  </part-list>
  <part id="P1">
    <measure number="1">
      <attributes>
        <divisions>1</divisions>
        <key><fifths>0</fifths></key>
        <time><beats>4</beats><beat-type>4</beat-type></time>
        <clef><sign>G</sign><line>2</line></clef>
      </attributes>\n`;

            notes.forEach(midi => {
                const step = MIDI_MAP[midi % 12];
                const alter = step.includes('#') ? 1 : 0;
                const stepName = step.replace('#', '');
                const octave = Math.floor(midi / 12) - 1;

                xml += `      <note>
        <pitch>
          <step>${stepName}</step>
          ${alter ? '<alter>1</alter>' : ''}
          <octave>${octave}</octave>
        </pitch>
        <duration>1</duration>
        <type>quarter</type>
      </note>\n`;
            });

            xml += `    </measure>
  </part>
</score-partwise>`;
            return xml;
        }

        function downloadXML(content, fileName) {
            const blob = new Blob([content], { type: 'application/vnd.recordare.musicxml+xml' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
